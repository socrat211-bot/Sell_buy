<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SouqPro - النسخة النهائية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0284c7; --dark: #0f172a; --success: #10b981; --warn: #f59e0b; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a, #1e293b); color: white; min-height: 100vh; padding: 10px; }
        .container { max-width: 600px; margin: auto; background: white; color: #333; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .btn { border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .hidden { display: none !important; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 15px; margin-bottom: 15px; background: #f9f9f9; }
        .chat-box { height: 300px; overflow-y: scroll; border: 1px solid #eee; padding: 10px; margin-bottom: 10px; background: #fff; }
        .toast { position: fixed; top: 20px; right: 20px; background: var(--success); color: white; padding: 15px; border-radius: 10px; z-index: 9999; }
    </style>
</head>
<body>

<div id="toast" class="toast hidden"></div>

<div class="container">
    <!-- Login Screen -->
    <div id="screen-login">
        <h2 style="text-align:center;">مرحباً بك في SouqPro 🤝</h2>
        <input id="input-name" type="text" placeholder="اسمك الكريم..." style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc;">
        <select id="input-role" style="width:100%; padding:10px; margin:10px 0;">
            <option value="merchant">تاجر 🏬</option>
            <option value="rep">مندوب 🛵</option>
        </select>
        <button class="btn btn-primary" onclick="login()">دخول المنصة</button>
    </div>

    <!-- Main App Screen -->
    <div id="screen-app" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3 id="welcome-msg"></h3>
            <button onclick="location.reload()" style="background:none; border:none; cursor:pointer;">خروج</button>
        </div>
        <input type="text" id="search" placeholder="🔍 بحث عن بضاعة..." oninput="render()" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd;">
        <div id="content-list"></div>
    </div>
</div>

<!-- Chat Modal -->
<div id="chat-modal" class="hidden" style="position:fixed; bottom:0; width:100%; max-width:600px; background:white; padding:20px; border-radius:20px 20px 0 0; box-shadow:0 -5px 20px rgba(0,0,0,0.2);">
    <h4 id="chat-title"></h4>
    <div class="chat-box" id="chat-messages"></div>
    <input id="chat-input" placeholder="رسالة..." style="width:70%; padding:10px;">
    <button onclick="sendMessage()">إرسال</button>
    <button onclick="document.getElementById('chat-modal').classList.add('hidden')">إغلاق</button>
</div>

<script>
    const FIREBASE_URL = "https://souq-app-35646-default-rtdb.firebaseio.com/"; // اللينك الخاص بك
    let user = { name: '', role: '' }, products = [], activeChatWith = '';

    function login() {
        user.name = document.getElementById('input-name').value;
        user.role = document.getElementById('input-role').value;
        if(!user.name) return alert("اكتب اسمك!");
        document.getElementById('screen-login').classList.add('hidden');
        document.getElementById('screen-app').classList.remove('hidden');
        document.getElementById('welcome-msg').innerText = user.role == 'merchant' ? "مرحباً تاجر " + user.name : "مرحباً مندوب " + user.name;
        loadData();
    }

    function loadData() {
        fetch(FIREBASE_URL + "data.json")
        .then(res => res.json())
        .then(data => {
            products = data?.products ? Object.keys(data.products).map(k => ({id: k, ...data.products[k]})) : [];
            render();
        });
        setInterval(loadData, 5000);
    }

    function render() {
        const query = document.getElementById('search').value;
        const list = document.getElementById('content-list');
        list.innerHTML = products.filter(p => p.name.includes(query)).map(p => `
            <div class="card">
                <h3>${p.name} 📦</h3>
                <p>السعر: ${p.price} ج.م</p>
                <p>التاجر: ${p.merchantName} ${p.rating ? '⭐' + p.rating : ''}</p>
                ${p.status === 'booked' ? `<p style="color:red">محجوز بواسطة: ${p.bookedBy}</p>` : 
                `<button class="btn btn-primary" onclick="book('${p.id}')">حجز البضاعة</button>`}
                <button class="btn" style="background:#ddd" onclick="startChat('${p.merchantName}')">💬 مراسلة التاجر</button>
            </div>
        `).join('');
    }

    function book(id) {
        fetch(FIREBASE_URL + `data/products/${id}.json`, {
            method: 'PATCH',
            body: JSON.stringify({ status: 'booked', bookedBy: user.name })
        }).then(() => {
            document.getElementById('toast').innerText = "تم حجز البضاعة!";
            document.getElementById('toast').classList.remove('hidden');
            setTimeout(() => document.getElementById('toast').classList.add('hidden'), 2000);
            loadData();
        });
    }

    function startChat(other) {
        activeChatWith = other;
        document.getElementById('chat-title').innerText = "دردشة مع: " + other;
        document.getElementById('chat-modal').classList.remove('hidden');
    }

    function sendMessage() {
        const msg = document.getElementById('chat-input').value;
        // هنا بيتم حفظ الرسالة في السيرفر (منطق بسيط للربط)
        alert("تم إرسال: " + msg); 
        document.getElementById('chat-input').value = '';
    }

</script>
</body>
</html>
