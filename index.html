<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوق التجار والمناديب الذكي الخفيف</title>
    <!-- خط القاهرة -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background-color: #0f172a; color: #1e293b; padding: 15px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        .app-card { background: white; width: 100%; max-w: 680px; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); padding: 25px; }
        .hidden { display: none !important; }
        .text-center { text-align: center; }
        
        h1 { font-size: 24px; font-weight: 900; color: #0284c7; margin-bottom: 5px; }
        p.subtitle { font-size: 13px; color: #64748b; margin-bottom: 25px; }
        
        label { display: block; font-size: 13px; font-weight: 700; color: #475569; margin: 12px 0 4px; text-align: right; }
        input, textarea { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px; background: #f8fafc; font-size: 14px; outline: none; text-align: right; }
        input:focus, textarea:focus { border-color: #0284c7; background: white; }
        
        .role-grid { display: flex; gap: 15px; margin-top: 10px; margin-bottom: 20px; }
        .role-btn { flex: 1; padding: 15px; border: 2px solid #e2e8f0; border-radius: 16px; background: white; font-size: 15px; font-weight: 700; cursor: pointer; text-align: center; color: #64748b; }
        .role-btn.active { border-color: #0284c7; background: #f0f9ff; color: #0284c7; }
        
        button.btn-submit { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 15px; background: #0284c7; color: white; }
        button.btn-submit:hover { background: #0369a1; }
        button.btn-back { background: #64748b; color: white; width: auto; padding: 6px 15px; border: none; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; }
        
        .panel-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f1f5f9; padding-bottom: 12px; margin-bottom: 20px; }
        
        .products-grid { display: grid; grid-template-columns: 1fr; gap: 15px; max-height: 420px; overflow-y: auto; padding-left: 5px; }
        @media(min-width: 535px) { .products-grid { grid-template-columns: 1fr 1fr; } }
        
        .prod-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; padding: 12px; display: flex; flex-direction: column; position: relative; text-align: right; }
        .prod-img { width: 100%; height: 140px; object-fit: cover; border-radius: 10px; background: #e2e8f0; margin-bottom: 8px; }
        .prod-title { font-weight: 700; font-size: 15px; color: #0f172a; }
        .prod-price { color: #10b981; font-weight: 800; font-size: 16px; margin: 2px 0; }
        .prod-shop { font-size: 11px; background: #e0f2fe; color: #0369a1; padding: 2px 8px; border-radius: 6px; display: inline-block; width: fit-content; font-weight: bold; margin-bottom: 5px; }
        .prod-desc { font-size: 12px; color: #64748b; margin-bottom: 10px; line-height: 1.4; }
        
        .actions-div { display: flex; flex-direction: column; gap: 6px; margin-top: auto; }
        .prod-contact { display: block; text-align: center; background: #10b981; color: white; padding: 8px; border-radius: 8px; font-size: 13px; font-weight: 700; text-decoration: none; }
        .prod-location { display: block; text-align: center; background: #0ea5e9; color: white; padding: 8px; border-radius: 8px; font-size: 13px; font-weight: 700; text-decoration: none; }
        
        .delete-btn { background: #ef4444; color: white; border: none; border-radius: 6px; padding: 2px 6px; font-size: 11px; font-weight: 700; cursor: pointer; position: absolute; top: 8px; left: 8px; z-index: 5; }
    </style>
</head>
<body>

    <div class="app-card">
        
        <!-- 1️⃣ شاشة الدخول واختيار الهوية -->
        <div id="screen-welcome">
            <div class="text-center">
                <h1>سوق التجار والمناديب الذكي 🤝</h1>
                <p class="subtitle">نسخة مدعومة بالصور المضغوطة لتجنب أي تهنيج أو بطء</p>
            </div>
            
            <label>اكتب اسمك أو اسم المحل الخاص بك:</label>
            <input id="user-display-name" type="text" placeholder="مثال: محل الأمانة، أو المندوب أحمد">
            
            <label style="margin-top: 15px;">اختر صفتك للدخول:</label>
            <div class="role-grid">
                <button id="btn-merchant-role" onclick="setRole('merchant')" class="role-btn active">🏬 أنا تاجر</button>
                <button id="btn-rep-role" onclick="setRole('representative')" class="role-btn">🛵 أنا مندوب</button>
            </div>
            
            <button onclick="loginUser()" class="btn-submit" style="background: #10b981;">دخول المنصة ➔</button>
        </div>

        <!-- 2️⃣ لوحة تحكم التاجر -->
        <div id="screen-merchant" class="hidden">
            <div class="panel-header">
                <button onclick="logout()" class="btn-back">خروج ↩</button>
                <h2 id="merchant-heading">لوحة التاجر 🏬</h2>
            </div>
            
            <!-- نموذج إضافة منتج معالج الصور -->
            <div style="background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 16px; margin-bottom: 20px;">
                <label>اسم البضاعة / المنتج</label>
                <input id="p-name" type="text" placeholder="مثال: كرتونة زيت، طرد ملابس">
                
                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <label>السعر (جنيه)</label>
                        <input id="p-price" type="number" placeholder="السعر">
                    </div>
                    <div style="flex: 1;">
                        <label>رقم التليفون</label>
                        <input id="p-phone" type="text" placeholder="01xxxxxxxxx">
                    </div>
                </div>

                <label>📍 رابط موقع المحل على خرائط جوجل</label>
                <input id="p-location" type="text" placeholder="ضع رابط لوكيشن المحل لتسهيل وصول المندوب">
                
                <label>وصف وتفاصيل البضاعة</label>
                <textarea id="p-desc" rows="2" placeholder="اكتب تفاصيل وحالة البضاعة هنا..."></textarea>
                
                <label>صورة المنتج (سيتم ضغطها تلقائياً لتسريع الموقع)</label>
                <input id="p-image" type="file" accept="image/*" style="background: white; padding: 8px;">
                
                <button onclick="processAndAddProduct()" class="btn-submit">نشر البضاعة بالصورة واللوكيشن</button>
            </div>
            
            <h3 style="font-size: 15px; margin-bottom: 10px; text-align: right;">📦 بضاعتك المعروضة حالياً:</h3>
            <div id="merchant-prods-list" class="products-grid"></div>
        </div>

        <!-- 3️⃣ لوحة تحكم المندوب -->
        <div id="screen-rep" class="hidden">
            <div class="panel-header">
                <button onclick="logout()" class="btn-back">خروج ↩</button>
                <h2 id="rep-heading">سوق المناديب 🛵</h2>
            </div>
            
            <h3 style="font-size: 15px; margin-bottom: 12px; text-align: right;">🛒 البضائع المتاحة حالياً في السوق للطلب:</h3>
            <div id="market-prods-list" class="products-grid"></div>
        </div>

    </div>

    <script>
        var allProducts = [];
        var currentUser = { name: '', role: 'merchant' };

        window.addEventListener('DOMContentLoaded', function() {
            var storedProds = localStorage.getItem('secure_market_prods');
            if(storedProds) { allProducts = JSON.parse(storedProds); }
        });

        function setRole(role) {
            currentUser.role = role;
            document.getElementById('btn-merchant-role').classList.remove('active');
            document.getElementById('btn-rep-role').classList.remove('active');
            if(role === 'merchant') { document.getElementById('btn-merchant-role').classList.add('active'); } 
            else { document.getElementById('btn-rep-role').classList.add('active'); }
        }

        function loginUser() {
            var nameInput = document.getElementById('user-display-name').value.trim();
            if(!nameInput) { alert('من فضلك اكتب اسمك أولاً!'); return; }
            currentUser.name = nameInput;
            document.getElementById('screen-welcome').classList.add('hidden');
            
            if(currentUser.role === 'merchant') {
                document.getElementById('merchant-heading').innerText = "محل: " + currentUser.name;
                renderMerchantProducts();
                document.getElementById('screen-merchant').classList.remove('hidden');
            } else {
                document.getElementById('rep-heading').innerText = "المندوب: " + currentUser.name;
                renderMarketProducts();
                document.getElementById('screen-rep').classList.remove('hidden');
            }
        }

        function logout() {
            document.getElementById('screen-merchant').classList.add('hidden');
            document.getElementById('screen-rep').classList.add('hidden');
            document.getElementById('screen-welcome').classList.remove('hidden');
        }

        // دالة ضغط الصورة الذكية لتقليل الحجم ومنع التهنيج
        function processAndAddProduct() {
            var name = document.getElementById('p-name').value.trim();
            var price = document.getElementById('p-price').value.trim();
            var phone = document.getElementById('p-phone').value.trim();
            var locationUrl = document.getElementById('p-location').value.trim();
            var desc = document.getElementById('p-desc').value.trim();
            var imgFile = document.getElementById('p-image').files[0];

            if(!name || !price || !phone) {
                alert('برجاء ملء خانات الاسم، السعر، والتليفون!');
                return;
            }

            var defaultImg = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 24 24' fill='none' stroke='%23cbd5e1' stroke-width='2'><rect x='3' y='3' width='18' height='18' rx='2'/><circle cx='8.5' cy='8.5' r='1.5'/><path d='M21 15l-5-5L5 21'/></svg>";

            if(imgFile) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    var img = new Image();
                    img.onload = function() {
                        // استخدام Canvas لضغط البكسل والأبعاد لتسريع الذاكرة
                        var canvas = document.createElement('canvas');
                        var max_size = 400; // أقصى عرض للصورة لتكون خفيفة جداً
                        var width = img.width;
                        var height = img.height;
                        if (width > height) {
                            if (width > max_size) { height *= max_size / width; width = max_size; }
                        } else {
                            if (height > max_size) { width *= max_size / height; height = max_size; }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        var ctx = canvas.getContext('2ctx') || canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // تصدير الصورة بجودة مضغوطة 60% فقط
                        var compressedBase64 = canvas.toDataURL('image/jpeg', 0.6);
                        saveProduct(name, price, phone, locationUrl, desc, compressedBase64);
                    }
                    img.src = e.target.result;
                }
                reader.readAsDataURL(imgFile);
            } else {
                saveProduct(name, price, phone, locationUrl, desc, defaultImg);
            }
        }

        function saveProduct(name, price, phone, locationUrl, desc, imgData) {
            var newProd = {
                id: Date.now(),
                merchantName: currentUser.name,
                name: name,
                price: price,
                phone: phone,
                location: locationUrl,
                desc: desc ? desc : 'بضاعة جاهزة للاستلام فوراً.',
                image: imgData
            };

            allProducts.push(newProd);
            localStorage.setItem('secure_market_prods', JSON.stringify(allProducts));

            alert('✅ تم نشر بضاعتك بالصورة والموقع بنجاح!');
            
            document.getElementById('p-name').value = '';
            document.getElementById('p-price').value = '';
            document.getElementById('p-phone').value = '';
            document.getElementById('p-location').value = '';
            document.getElementById('p-desc').value = '';
            document.getElementById('p-image').value = '';

            renderMerchantProducts();
        }

        function renderMerchantProducts() {
            var list = document.getElementById('merchant-prods-list');
            var html = '';
            var count = 0;

            for(var i = 0; i < allProducts.length; i++) {
                if(allProducts[i].merchantName === currentUser.name) {
                    count++;
                    var locLink = allProducts[i].location ? '<a class="prod-location" href="' + allProducts[i].location + '" target="_blank">📍 لوكيشن محلك المرفوع</a>' : '';
                    
                    html += '<div class="prod-card">' +
                            '<button onclick="deleteProduct(' + allProducts[i].id + ')" class="delete-btn">حذف ❌</button>' +
                            '<img class="prod-img" src="' + allProducts[i].image + '">' +
                            '<div class="prod-title">📦 ' + allProducts[i].name + '</div>' +
                            '<div class="prod-price">' + allProducts[i].price + ' ج.م</div>' +
                            '<div class="prod-desc">' + allProducts[i].desc + '</div>' +
                            '<div class="actions-div">' +
                            '<span style="font-size:12px; color:#475569; text-align:center;">📞 تليفونك: ' + allProducts[i].phone + '</span>' +
                            locLink +
                            '</div></div>';
                }
            }
            list.innerHTML = count === 0 ? '<p style="text-align:center; font-size:12px; color:#94a3b8; padding:15px; grid-column:1/-1;">لم تقم بعرض أي بضاعة بعد.</p>' : html;
        }

        function deleteProduct(id) {
            allProducts = allProducts.filter(function(p) { return p.id !== id; });
            localStorage.setItem('secure_market_prods', JSON.stringify(allProducts));
            renderMerchantProducts();
        }

        function renderMarketProducts() {
            var list = document.getElementById('market-prods-list');
            var html = '';

            if(allProducts.length === 0) {
                list.innerHTML = '<p style="text-align:center; font-size:13px; color:#94a3b8; padding:30px; grid-column:1/-1;">السوق فارغ تماماً حالياً.</p>';
                return;
            }

            for(var i = 0; i < allProducts.length; i++) {
                var locLink = allProducts[i].location ? '<a class="prod-location" href="' + allProducts[i].location + '" target="_blank">📍 موقع المحل على الخريطة</a>' : '<span style="font-size:11px; color:#94a3b8; text-align:center;">لم يضف التاجر لوكيشن</span>';
                
                html += '<div class="prod-card">' +
                        '<img class="prod-img" src="' + allProducts[i].image + '">' +
                        '<div class="prod-shop">🏬 التاجر: ' + allProducts[i].merchantName + '</div>' +
                        '<div class="prod-title">📦 ' + allProducts[i].name + '</div>' +
                        '<div class="prod-price">' + allProducts[i].price + ' ج.م</div>' +
                        '<div class="prod-desc">' + allProducts[i].desc + '</div>' +
                        '<div class="actions-div">' +
                        '<a class="prod-contact" href="tel:' + allProducts[i].phone + '">📞 اتصال وتفاوض (' + allProducts[i].phone + ')</a>' +
                        locLink +
                        '</div></div>';
            }
            list.innerHTML = html;
        }
    </script>
</body>
</html>
